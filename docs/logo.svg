<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="futron-scrape">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#101a30"/>
    </linearGradient>
    <linearGradient id="t1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="t2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="t3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="t4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#84cc16"/>
      <stop offset="100%" stop-color="#a3e635"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="256" height="256" rx="48" ry="48" fill="url(#bg)"/>

  <!-- Cascade chevrons — each tier slightly wider, brighter, lower -->
  <g filter="url(#glow)">
    <!-- T1 (top, narrowest) -->
    <path d="M88 60 L168 60 L150 84 L106 84 Z" fill="url(#t1)"/>
    <!-- T2 -->
    <path d="M76 96 L180 96 L162 120 L94 120 Z" fill="url(#t2)" opacity="0.95"/>
    <!-- T3 -->
    <path d="M64 132 L192 132 L174 156 L82 156 Z" fill="url(#t3)" opacity="0.95"/>
    <!-- T4 (bottom, widest, lime accent = "free") -->
    <path d="M52 168 L204 168 L186 196 L70 196 Z" fill="url(#t4)"/>
  </g>

  <!-- Connecting cascade dots -->
  <g fill="#e2e8f0" opacity="0.55">
    <circle cx="128" cy="50" r="2.5"/>
    <circle cx="128" cy="208" r="2.5"/>
  </g>

  <!-- Subtle "FS" monogram on the bottom-right tier (only visible at full size, removable) -->
  <text x="128" y="234" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="14" font-weight="700"
        text-anchor="middle" fill="#94a3b8" letter-spacing="2">FUTRON-SCRAPE</text>
</svg>
